services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-breach_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-breach_password}
      POSTGRES_DB: ${POSTGRES_DB:-breach_analytics}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # The backend reads this value through app.core.config.get_settings().
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://breach_user:breach_password@db:5432/breach_analytics}
      # Optional. Leave empty to use the deterministic mock summarizer.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Local analyst uploads are stored in a bind-mounted folder.
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - ./backend/migrations:/app/migrations
      - ./backend/alembic.ini:/app/alembic.ini
      - ./data:/data:ro
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Browser-facing URL. This is what recruiters/users can see and use.
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      # Server-rendered Next.js code runs inside this container, so it uses the
      # Docker Compose service name to reach FastAPI.
      FRONTEND_SERVER_API_BASE_URL: ${FRONTEND_SERVER_API_BASE_URL:-http://backend:8000}
      # Makes file watching more reliable on Windows bind mounts.
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
